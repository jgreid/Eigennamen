# Fly.io configuration for Eigennamen game server
# See https://fly.io/docs/reference/configuration/ for details
#
# STORAGE: This app defaults to in-memory storage (REDIS_URL=memory).
# This works but rooms only exist on ONE machine - if Fly routes a player
# to a different machine, they get "room not found". To fix this:
#   1. fly redis create
#   2. fly secrets set REDIS_URL=rediss://...
#   3. Remove REDIS_URL and MEMORY_MODE_ALLOW_FLY from [env] below
# Until then, keep exactly 1 machine: fly scale count 1
#
# NOTE: `min_machines_running = 1` below is a floor, not a ceiling — it does not
# stop the autoscaler from starting a 2nd machine if auto_start_machines and the
# concurrency limits (both set below) decide load warrants it. Nothing in this
# config or the deploy pipeline currently enforces the "exactly 1 machine" rule
# automatically; see docs/HARDENING_PLAN.md P2-5 before relying on manual
# `fly scale count 1` alone in a real production rollout.

app = "eigennamen"
primary_region = "iad"

# Give the process time to drain and shut down cleanly on deploy/restart. Fly's
# default is 5s, which SIGKILLs the app before its own 10s force-exit net (see
# server/src/index.ts) can even fire — cutting off the graceful socket drain and
# clean Redis disconnect. 15s comfortably exceeds that 10s force-exit. (B14)
kill_timeout = 15

[build]
  dockerfile = "server/Dockerfile"

  # --- Strong ("scary good") bots via word embeddings (ENABLED) ---
  # The bots run on the offline association table with NO asset — but the table
  # only covers its own curated concepts, so bots interpret most HUMAN clues
  # without semantics (spelling similarity only, one humble guess). Baking a
  # word-vectors model gives bots real semantic guessing and strong GENERATED
  # clues; the server auto-detects the baked file at /app/embeddings/vectors.vec
  # (no env var needed). The bake downloads ~600 MB at image build time (Fly's
  # remote builder; cached in the layer until scripts/ changes) and distils it
  # to compact board-restricted vectors. It needs the 1 GB VM configured below.
  # If the bake or file is ever missing/unusable the server safely falls back
  # to the offline table, so this can't break a game. To disable, comment these
  # two lines out again (and optionally drop the VM back to 512 MB).
  [build.args]
    BOT_EMBEDDINGS_MODEL = "numberbatch"   # glove | fasttext | numberbatch

[deploy]
  strategy = "immediate"
  # The game works fully with just in-memory storage (REDIS_URL=memory)

# Embeddings need more RAM than a small default — the [[vm]] block below is
# sized to 1 GB for the bake enabled above. If you disable the bake, 512 MB
# ("512mb") is enough.

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"

  # Strong-bot embeddings (baked via [build.args] above). The baked model is
  # auto-detected at /app/embeddings/vectors.vec — BOT_EMBEDDINGS_PATH is only
  # needed to override that ("off" disables). BOT_EMBEDDINGS_MAX_WORDS bounds
  # memory use (the board-distilled artifact is ~42k vectors, under the 50k
  # default cap, so no override is needed).
  # BOT_EMBEDDINGS_PATH = "/app/embeddings/vectors.vec"
  # BOT_EMBEDDINGS_MAX_WORDS = "60000"

  # CORS origin - set to your Fly app domain
  # Override with: fly secrets set CORS_ORIGIN=https://yourdomain.com
  CORS_ORIGIN = "https://eigennamen.fly.dev"

  # Storage backend for game state (rooms, players, timers).
  # RECOMMENDED: Provision Redis and move REDIS_URL to a Fly secret:
  #   fly redis create && fly secrets set REDIS_URL=rediss://...
  # Then delete these two lines:
  REDIS_URL = "memory"
  MEMORY_MODE_ALLOW_FLY = "true"

[http_service]
  internal_port = 3000
  force_https = true
  # Use "stop" instead of "suspend" to allow graceful WebSocket disconnection
  # Suspend immediately kills connections which breaks real-time games
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least 1 machine running to maintain WebSocket connections
  # Set to 0 only if you want to save costs and accept connection drops
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Service-level health check (used for routing decisions)
# This is the only health check needed - the separate [checks] block was
# causing duplicate checks that raced against startup, producing spurious
# "failed" messages before the grace period could take effect.
[[http_service.checks]]
  grace_period = "60s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health/ready"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
