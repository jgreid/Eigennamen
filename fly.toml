# Fly.io configuration for Eigennamen game server
# See https://fly.io/docs/reference/configuration/ for details
#
# STORAGE: This app defaults to in-memory storage (REDIS_URL=memory).
# This works but rooms only exist on ONE machine - if Fly routes a player
# to a different machine, they get "room not found". To fix this:
#   1. fly redis create
#   2. fly secrets set REDIS_URL=rediss://...
#   3. Remove REDIS_URL and MEMORY_MODE_ALLOW_FLY from [env] below
# Until then, keep exactly 1 machine: fly scale count 1

app = "eigennamen"
primary_region = "iad"

[build]
  dockerfile = "server/Dockerfile"

[deploy]
  strategy = "immediate"
  # The game works fully with just in-memory storage (REDIS_URL=memory)

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"

  # CORS origin - set to your Fly app domain
  # Override with: fly secrets set CORS_ORIGIN=https://yourdomain.com
  CORS_ORIGIN = "https://eigennamen.fly.dev"

  # Storage backend for game state (rooms, players, timers).
  # RECOMMENDED: Provision Redis and move REDIS_URL to a Fly secret:
  #   fly redis create && fly secrets set REDIS_URL=rediss://...
  # Then delete these two lines:
  REDIS_URL = "memory"
  MEMORY_MODE_ALLOW_FLY = "true"

[http_service]
  internal_port = 3000
  force_https = true
  # Use "stop" instead of "suspend" to allow graceful WebSocket disconnection
  # Suspend immediately kills connections which breaks real-time games
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least 1 machine running to maintain WebSocket connections
  # Set to 0 only if you want to save costs and accept connection drops
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Service-level health check (used for routing decisions)
# This is the only health check needed - the separate [checks] block was
# causing duplicate checks that raced against startup, producing spurious
# "failed" messages before the grace period could take effect.
[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health/ready"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
