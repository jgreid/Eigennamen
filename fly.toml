# Fly.io configuration for Die Eigennamen game server
# See https://fly.io/docs/reference/configuration/ for details
#
# IMPORTANT: This app uses in-memory storage (REDIS_URL=memory) by default.
# Only 1 machine should be running - multiple machines have separate game state!
# After first deploy, scale to 1 machine:  fly scale count 1

app = "die-eigennamen"
primary_region = "iad"

[build]
  dockerfile = "server/Dockerfile"

[deploy]
  strategy = "immediate"
  # Database migrations are skipped - database is optional
  # The game works fully with just in-memory storage (REDIS_URL=memory)
  # To enable database: set DATABASE_URL secret and uncomment the release_command below
  # release_command = "sh -c 'npx prisma migrate deploy || npx prisma db push --skip-generate'"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"

  # CORS origin - set to your Fly app domain
  # Override with: fly secrets set CORS_ORIGIN=https://yourdomain.com
  CORS_ORIGIN = "https://die-eigennamen.fly.dev"

  # RECOMMENDED: Use Fly.io Upstash Redis for shared state across machines
  #   fly redis create
  #   fly secrets set REDIS_URL=rediss://...
  #
  # Fallback: In-memory storage mode (single-instance only!)
  # WARNING: Memory mode means rooms exist ONLY on the machine that created them.
  # If Fly.io routes a joining player to a different machine, they get ROOM_NOT_FOUND.
  # Memory mode is ONLY safe with exactly 1 machine (fly scale count 1).
  REDIS_URL = "memory"
  # DATABASE_URL is NOT required - the game works fully without a database
  # Database only needed for: user accounts, game history, persistent word lists

[http_service]
  internal_port = 3000
  force_https = true
  # Use "stop" instead of "suspend" to allow graceful WebSocket disconnection
  # Suspend immediately kills connections which breaks real-time games
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least 1 machine running to maintain WebSocket connections
  # Set to 0 only if you want to save costs and accept connection drops
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Service-level health check (used for routing decisions)
# This is the only health check needed - the separate [checks] block was
# causing duplicate checks that raced against startup, producing spurious
# "failed" messages before the grace period could take effect.
[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health/ready"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
