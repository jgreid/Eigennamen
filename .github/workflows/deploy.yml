name: Deploy

on:
  # Auto-deploy when CI passes on main
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

  # Manual deployment trigger
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false  # Never cancel an in-progress deployment

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    # Only deploy if CI succeeded (for workflow_run trigger) or manual trigger
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://eigennamen.fly.dev

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          # Deploy exactly the commit CI validated, not whatever HEAD happens to
          # be on main at event time (a later push could otherwise be shipped
          # without having passed CI). Falls back to github.sha for workflow_dispatch.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Pre-deploy validation
        run: |
          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

      - name: Deploy to Fly.io
        run: |
          flyctl deploy --remote-only \
            --strategy immediate \
            --wait-timeout 300
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify deployment health
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY

          # Wait for the new deployment to be healthy.
          # /health/ready returns HTTP 200 {"status":"ready"} when every
          # dependency is up and HTTP 503 {"status":"degraded"} otherwise — so
          # curl's -f (fail on >=400) makes its exit code the health signal.
          # (The old `grep -q "ok"` never matched: no success body contains "ok".)
          sleep 10

          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null https://eigennamen.fly.dev/health/ready 2>/dev/null; then
              echo "Deployment healthy after ${i}0s"
              echo "- **Status**: Healthy" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "Waiting for health check (attempt $i/30)..."
            sleep 10
          done

          echo "::error::Deployment health check failed after 5 minutes"
          echo "- **Status**: UNHEALTHY" >> $GITHUB_STEP_SUMMARY
          exit 1
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Deployment completed successfully." >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Deployment failed. Check logs with: \`flyctl logs --app eigennamen\`" >> $GITHUB_STEP_SUMMARY
          fi

  # Rollback job - runs whenever a deploy fails, for BOTH the auto (workflow_run)
  # and manual (workflow_dispatch) paths. It needs only FLY_API_TOKEN (no
  # checkout), so it works under workflow_run too. Requires the health-check fix
  # above to be meaningful — otherwise a false "unhealthy" would revert a good release.
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: failure()
    needs: deploy
    environment: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # 1.6

      - name: Get previous release
        id: prev
        run: |
          PREV_VERSION=$(flyctl releases --json | jq -r '.[1].Version // empty')
          echo "version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous version: $PREV_VERSION"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Rollback to previous version
        if: steps.prev.outputs.version != ''
        run: |
          echo "Rolling back to version ${{ steps.prev.outputs.version }}"
          flyctl deploy --image registry.fly.io/eigennamen:deployment-${{ steps.prev.outputs.version }} --strategy immediate
          echo "## Rollback" >> $GITHUB_STEP_SUMMARY
          echo "Rolled back to version ${{ steps.prev.outputs.version }}" >> $GITHUB_STEP_SUMMARY
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
