name: CodeQL Analysis

on:
  push:
    branches: [main]
    paths:
      - 'server/src/**'
      - 'server/public/js/**'
      - '*.js'
      - '*.ts'
  pull_request:
    branches: [main]
    paths:
      - 'server/src/**'
      - 'server/public/js/**'
      - '*.js'
      - '*.ts'
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7aefa1c9aed02ae41531ec219164e64a0f087410 # v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality
          # Exclude non-application code from analysis: tests, load tests, and
          # the repo's build/dev scripts. `scripts/` are manually-run developer
          # tools (embeddings download, semantic-map/association generation) that
          # take trusted developer CLI args and run on a dev/CI machine — not the
          # deployed runtime attack surface — so CodeQL's app-security queries
          # produce noise there (e.g. flagging a `--out <path>` CLI argument as
          # "path injection"). They join loadtest/e2e/__tests__, which are already
          # excluded for the same reason.
          config: |
            paths-ignore:
              - 'server/src/__tests__'
              - 'server/e2e'
              - 'server/loadtest'
              - 'scripts'
              - 'node_modules'

      - name: Autobuild
        uses: github/codeql-action/autobuild@7aefa1c9aed02ae41531ec219164e64a0f087410 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7aefa1c9aed02ae41531ec219164e64a0f087410 # v4
        with:
          category: '/language:${{ matrix.language }}'
