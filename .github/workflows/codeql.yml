name: CodeQL Analysis

on:
  push:
    branches: [main]
    paths:
      - 'server/src/**'
      - 'server/public/js/**'
      - '*.js'
      - '*.ts'
  pull_request:
    branches: [main]
    paths:
      - 'server/src/**'
      - 'server/public/js/**'
      - '*.js'
      - '*.ts'
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7aefa1c9aed02ae41531ec219164e64a0f087410 # v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality
          # Exclude test files from analysis
          config: |
            paths-ignore:
              - 'server/src/__tests__'
              - 'server/e2e'
              - 'server/loadtest'
              - 'node_modules'

      - name: Autobuild
        uses: github/codeql-action/autobuild@7aefa1c9aed02ae41531ec219164e64a0f087410 # v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7aefa1c9aed02ae41531ec219164e64a0f087410 # v4
        with:
          category: '/language:${{ matrix.language }}'
