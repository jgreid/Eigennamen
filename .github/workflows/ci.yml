name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          REDIS_URL: memory

      - name: Run tests with coverage
        if: matrix.node-version == 20
        run: npm run test:coverage -- --ci
        env:
          NODE_ENV: test
          REDIS_URL: memory

      - name: Upload coverage artifact
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 14

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      - name: Run ESLint
        # Non-blocking until existing lint errors are cleaned up (27 errors, 138 warnings).
        # Remove continue-on-error once errors reach 0 to make lint a hard gate.
        continue-on-error: true
        run: npm run lint

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f server/Dockerfile -t codenames:ci .

      - name: Verify image starts
        run: |
          docker run -d --name ci-test \
            -e NODE_ENV=production \
            -e REDIS_URL=memory \
            -e JWT_SECRET=ci-test-secret \
            -e CORS_ORIGIN='*' \
            -p 3000:3000 \
            codenames:ci

          # Wait for server to be ready
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start"
              docker logs ci-test
              exit 1
            fi
            sleep 1
          done

          # Verify health endpoint returns ok
          curl -sf http://localhost:3000/health | grep -q "ok" || {
            echo "Health check returned unexpected response:"
            curl -sf http://localhost:3000/health
            exit 1
          }

          docker stop ci-test
