name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write  # For Trivy SARIF upload

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Shared environment for all server jobs
env:
  NODE_VERSION: 22
  WORKING_DIR: server

jobs:
  # ── Install & cache dependencies (shared by downstream jobs) ──────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci

      # Cache the entire node_modules so downstream jobs skip npm ci
      - uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: server/node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('server/package-lock.json') }}

  # ── Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: server/node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('server/package-lock.json') }}

      - name: Run ESLint
        run: npm run lint

      - name: Check Prettier formatting
        run: npm run format:check

  # ── Type check ─────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: server/node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('server/package-lock.json') }}

      - name: Run TypeScript type checking
        run: npm run typecheck

  # ── Build verification ─────────────────────────────────────────────────
  build:
    name: Build
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # Need root index.html for Dockerfile context, but build only needs server/
          fetch-depth: 1

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: server/node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('server/package-lock.json') }}

      - name: Build production artifacts
        run: npm run build:prod

      - name: Report bundle sizes
        run: |
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size (raw) | Size (gzip) |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|-------------|" >> $GITHUB_STEP_SUMMARY

          # App bundle (ESM with code splitting)
          APP_ENTRY=$(ls -1 public/js/modules/app.js public/js/modules/app-*.js 2>/dev/null | head -1)
          if [ -n "$APP_ENTRY" ]; then
            RAW=$(wc -c < "$APP_ENTRY" | tr -d ' ')
            GZIP=$(gzip -c "$APP_ENTRY" | wc -c | tr -d ' ')
            echo "| app (entry) | ${RAW} B | ${GZIP} B |" >> $GITHUB_STEP_SUMMARY
          fi

          # All chunks combined
          CHUNKS_DIR="public/js/modules/chunks"
          if [ -d "$CHUNKS_DIR" ]; then
            CHUNK_RAW=$(find "$CHUNKS_DIR" -name '*.js' -exec cat {} + | wc -c | tr -d ' ')
            CHUNK_GZIP=$(find "$CHUNKS_DIR" -name '*.js' -exec cat {} + | gzip -c | wc -c | tr -d ' ')
            CHUNK_COUNT=$(find "$CHUNKS_DIR" -name '*.js' | wc -l | tr -d ' ')
            echo "| chunks (${CHUNK_COUNT} files) | ${CHUNK_RAW} B | ${CHUNK_GZIP} B |" >> $GITHUB_STEP_SUMMARY
          fi

          # Socket client (IIFE)
          SOCKET="public/js/socket-client.js"
          if [ -f "$SOCKET" ]; then
            RAW=$(wc -c < "$SOCKET" | tr -d ' ')
            GZIP=$(gzip -c "$SOCKET" | wc -c | tr -d ' ')
            echo "| socket-client | ${RAW} B | ${GZIP} B |" >> $GITHUB_STEP_SUMMARY
          fi

          # Total JS
          TOTAL_RAW=$(find public/js -name '*.js' -not -name '*.map' -exec cat {} + | wc -c | tr -d ' ')
          TOTAL_GZIP=$(find public/js -name '*.js' -not -name '*.map' -exec cat {} + | gzip -c | wc -c | tr -d ' ')
          echo "| **Total JS** | **${TOTAL_RAW} B** | **${TOTAL_GZIP} B** |" >> $GITHUB_STEP_SUMMARY

          # Fail if total gzipped JS exceeds 200KB (safety net)
          MAX_GZIP_KB=200
          TOTAL_GZIP_KB=$((TOTAL_GZIP / 1024))
          if [ "$TOTAL_GZIP_KB" -gt "$MAX_GZIP_KB" ]; then
            echo "::warning::Total gzipped JS (${TOTAL_GZIP_KB}KB) exceeds ${MAX_GZIP_KB}KB threshold"
          fi

      # Cache the build output for E2E and other jobs
      - uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            server/dist
            server/public/js/modules
          key: build-${{ github.sha }}

  # ── Unit & integration tests ───────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    needs: install
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ matrix.node-version }}

      # For the primary version, restore the cached node_modules.
      # For other versions, run npm ci since native modules may differ.
      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        if: matrix.node-version == env.NODE_VERSION
        with:
          path: server/node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('server/package-lock.json') }}

      - name: Install dependencies
        if: matrix.node-version != env.NODE_VERSION
        run: npm ci

      - name: Run tests with coverage
        run: npx jest --config jest.config.ts.js --ci --coverage --forceExit
        env:
          NODE_ENV: test
          REDIS_URL: memory

      - name: Upload coverage artifact
        if: matrix.node-version == 22
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 14

      # Post coverage summary to PR
      - name: Coverage summary
        if: matrix.node-version == 22 && github.event_name == 'pull_request'
        run: |
          # Extract coverage percentages from the text summary
          COVERAGE_FILE="coverage/coverage-summary.json"
          if [ -f "$COVERAGE_FILE" ]; then
            LINES=$(node -e "const c=require('./$COVERAGE_FILE');console.log(c.total.lines.pct)")
            BRANCHES=$(node -e "const c=require('./$COVERAGE_FILE');console.log(c.total.branches.pct)")
            FUNCTIONS=$(node -e "const c=require('./$COVERAGE_FILE');console.log(c.total.functions.pct)")
            STMTS=$(node -e "const c=require('./$COVERAGE_FILE');console.log(c.total.statements.pct)")

            echo "## Test Coverage" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Coverage |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
            echo "| Statements | ${STMTS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Branches | ${BRANCHES}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Functions | ${FUNCTIONS}% |" >> $GITHUB_STEP_SUMMARY
            echo "| Lines | ${LINES}% |" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Security audit ─────────────────────────────────────────────────────
  security:
    name: Security Audit
    needs: install
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: server/node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('server/package-lock.json') }}

      - name: Audit production dependencies
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY

          # Audit production dependencies only (dev deps don't ship)
          npm audit --omit=dev --json > audit-prod.json 2>/dev/null || true

          PROD_CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-prod.json)
          PROD_HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-prod.json)
          PROD_MODERATE=$(jq '.metadata.vulnerabilities.moderate // 0' audit-prod.json)

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Production Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "| Severity | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Critical | ${PROD_CRITICAL} |" >> $GITHUB_STEP_SUMMARY
          echo "| High | ${PROD_HIGH} |" >> $GITHUB_STEP_SUMMARY
          echo "| Moderate | ${PROD_MODERATE} |" >> $GITHUB_STEP_SUMMARY

          # Known/accepted vulnerabilities (no fix available):
          # (none currently — swagger-jsdoc was removed to eliminate GHSA-3ppc-4f35-3m26)
          KNOWN_ADVISORIES=""

          # Count unknown high/critical vulnerabilities (excluding known accepted ones)
          UNKNOWN_HIGH_CRITICAL=$(jq --arg known "$KNOWN_ADVISORIES" '
            [.vulnerabilities | to_entries[]
             | select(.value.severity == "critical" or .value.severity == "high")
             | select(
                 # Check if ALL via entries for this vulnerability are known advisories
                 ([.value.via[] | if type == "object" then .url // "" else "" end]
                  | map(. as $url | ($known | split(" ") | map(. as $id | $url | contains($id))) | any)
                  | all | not)
               )
            ] | length
          ' audit-prod.json)

          # Fail only on unknown critical/high vulnerabilities
          if [ "$PROD_CRITICAL" -gt 0 ] || [ "$UNKNOWN_HIGH_CRITICAL" -gt 0 ]; then
            echo ""
            echo "::error::Production dependency vulnerabilities found (critical=${PROD_CRITICAL}, unknown high=${UNKNOWN_HIGH_CRITICAL})"
            jq '.vulnerabilities | to_entries[] | select(.value.severity == "critical" or .value.severity == "high") | "\(.key): \(.value.severity) - \(.value.title // "No title")"' audit-prod.json
            exit 1
          fi

          if [ "$PROD_HIGH" -gt 0 ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Note**: ${PROD_HIGH} high-severity finding(s) from known/accepted advisories (no fix available)." >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No actionable critical or high vulnerabilities in production dependencies." >> $GITHUB_STEP_SUMMARY

      - name: Audit all dependencies (informational)
        if: always()
        run: |
          npm audit --json > audit-all.json 2>/dev/null || true

          ALL_CRITICAL=$(jq '.metadata.vulnerabilities.critical // 0' audit-all.json)
          ALL_HIGH=$(jq '.metadata.vulnerabilities.high // 0' audit-all.json)

          if [ "$ALL_CRITICAL" -gt 0 ] || [ "$ALL_HIGH" -gt 0 ]; then
            echo "::warning::Dev dependency vulnerabilities: critical=${ALL_CRITICAL}, high=${ALL_HIGH} (non-blocking)"
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### All Dependencies (informational)" >> $GITHUB_STEP_SUMMARY
            echo "Dev dependency vulnerabilities: critical=${ALL_CRITICAL}, high=${ALL_HIGH}" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload audit results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: security-audit
          path: |
            server/audit-prod.json
            server/audit-all.json
          retention-days: 30

  # ── Docker build & container scan ──────────────────────────────────────
  docker:
    name: Docker Build & Scan
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: server/Dockerfile
          load: true
          tags: eigennamen:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container starts and serves traffic
        run: |
          docker run -d --name ci-test \
            -e NODE_ENV=production \
            -e REDIS_URL=memory \
            -e JWT_SECRET=ci-test-secret-that-is-long-enough-for-production \
            -e CORS_ORIGIN='http://localhost:3000' \
            -e MEMORY_MODE_ALLOW_FLY=true \
            -p 3000:3000 \
            eigennamen:ci

          # Wait for server to be ready (up to 60s for Redis init)
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/health/ready > /dev/null 2>&1; then
              echo "Server healthy after ${i}s"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Server failed to start within 60s"
              docker logs ci-test
              exit 1
            fi
            sleep 1
          done

          # Verify health endpoint
          HEALTH=$(curl -sf http://localhost:3000/health)
          echo "Health response: $HEALTH"
          echo "$HEALTH" | grep -q "ok" || {
            echo "::error::Health check returned unexpected response"
            exit 1
          }

          # Verify ready endpoint (checks all dependencies)
          READY=$(curl -sf http://localhost:3000/health/ready)
          echo "Ready response: $READY"

          docker stop ci-test

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518 # 0.34.1
        with:
          image-ref: 'eigennamen:ci'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7aefa1c9aed02ae41531ec219164e64a0f087410 # v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ── E2E tests ──────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: server/node_modules
          key: node-modules-${{ runner.os }}-${{ env.NODE_VERSION }}-${{ hashFiles('server/package-lock.json') }}

      - uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            server/dist
            server/public/js/modules
          key: build-${{ github.sha }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start server
        run: |
          node dist/index.js &
          echo $! > /tmp/server.pid
        env:
          NODE_ENV: test
          REDIS_URL: memory
          PORT: 3000
          JWT_SECRET: e2e-test-secret-long-enough-for-validation

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server failed to start within 30s"
          exit 1

      - name: Run Playwright tests
        run: npx playwright test --project=chromium
        env:
          BASE_URL: http://localhost:3000
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-report
          path: server/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: playwright-traces
          path: server/test-results/
          retention-days: 7

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi

  # ── Gate: all checks must pass before merge ────────────────────────────
  ci-passed:
    name: CI Passed
    if: always()
    needs: [lint, typecheck, build, test, security, docker, e2e]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          echo "Lint: ${{ needs.lint.result }}"
          echo "Typecheck: ${{ needs.typecheck.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Test: ${{ needs.test.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Docker: ${{ needs.docker.result }}"
          echo "E2E: ${{ needs.e2e.result }}"

          # Fail if any required job failed
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.security.result }}" != "success" ] || \
             [ "${{ needs.docker.result }}" != "success" ] || \
             [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI checks passed!"
