# Fly.io configuration for Codenames game server
# See https://fly.io/docs/reference/configuration/ for details

app = "risley-codenames"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Run database migrations before starting the app
  # Uses 'migrate deploy' for production (safe, applies pending migrations)
  # Falls back DATABASE_DIRECT_URL to DATABASE_URL if not set (for PgBouncer compatibility)
  # Note: First deployment requires manual 'prisma migrate dev' locally to create initial migration
  release_command = "sh -c 'export DATABASE_DIRECT_URL=${DATABASE_DIRECT_URL:-$DATABASE_URL} && npx prisma migrate deploy || npx prisma db push --skip-generate'"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"
  # IMPORTANT: REDIS_URL defaults to "memory" for single-instance deployments
  # This means data is NOT persisted across restarts and scaling to multiple
  # instances will NOT work (each instance has its own isolated state).
  # For production with persistence/scaling, set REDIS_URL secret:
  #   fly secrets set REDIS_URL=rediss://... (for Upstash Redis)
  REDIS_URL = "memory"

[http_service]
  internal_port = 3000
  force_https = true
  # Use "stop" instead of "suspend" to allow graceful WebSocket disconnection
  # Suspend immediately kills connections which breaks real-time games
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least 1 machine running to maintain WebSocket connections
  # Set to 0 only if you want to save costs and accept connection drops
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Health check that verifies all dependencies (Redis, DB, Socket.io)
[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health/ready"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health/ready"
    port = 3000
    type = "http"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
