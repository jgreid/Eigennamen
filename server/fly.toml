# Fly.io configuration for Codenames game server
# See https://fly.io/docs/reference/configuration/ for details

app = "risley-codenames"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # Database migrations are skipped - database is optional
  # The game works fully with just in-memory storage (REDIS_URL=memory)
  # To enable database: set DATABASE_URL secret and uncomment the release_command below
  # release_command = "sh -c 'npx prisma migrate deploy || npx prisma db push --skip-generate'"

[env]
  NODE_ENV = "production"
  PORT = "3000"
  LOG_LEVEL = "info"
  # In-memory storage mode - no external dependencies required!
  # Game data lives in memory (lost on restart, but rooms are temporary anyway)
  # For persistence/scaling, set REDIS_URL secret: fly secrets set REDIS_URL=rediss://...
  REDIS_URL = "memory"
  # DATABASE_URL is NOT required - the game works fully without a database
  # Database only needed for: user accounts, game history, persistent word lists

[http_service]
  internal_port = 3000
  force_https = true
  # Use "stop" instead of "suspend" to allow graceful WebSocket disconnection
  # Suspend immediately kills connections which breaks real-time games
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least 1 machine running to maintain WebSocket connections
  # Set to 0 only if you want to save costs and accept connection drops
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

# Health check that verifies all dependencies (Redis, DB, Socket.io)
[[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  timeout = "10s"
  path = "/health/ready"

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "10s"
    path = "/health/ready"
    port = 3000
    type = "http"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
