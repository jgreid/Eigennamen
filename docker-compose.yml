version: '3.8'

services:
  # Main API server
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Use development for local Docker environment
      # Production settings are configured in fly.toml for Fly.io deployment
      - NODE_ENV=development
      - PORT=3000
      # ISSUE #53 FIX: Set POSTGRES_PASSWORD via .env file or shell for non-local environments
      # The default password is acceptable ONLY for local Docker development
      # Production on Fly.io uses different configuration (see fly.toml)
      - DATABASE_URL=postgresql://codenames:${POSTGRES_PASSWORD:-local-dev-password-do-not-use-in-prod}@db:5432/codenames
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - LOG_LEVEL=debug
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run database migration before starting the server
    command: sh -c "./node_modules/.bin/prisma db push --skip-generate && node src/index.js"
    restart: unless-stopped
    networks:
      - codenames-network
    healthcheck:
      # Use /health/ready for comprehensive dependency check (DB, Redis, Socket.io)
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=codenames
      # ISSUE #53 FIX: Set POSTGRES_PASSWORD via .env file for non-local environments
      # This default is ONLY for local Docker development
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-local-dev-password-do-not-use-in-prod}
      - POSTGRES_DB=codenames
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codenames -d codenames"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - codenames-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - codenames-network

volumes:
  postgres_data:
  redis_data:

networks:
  codenames-network:
    driver: bridge
