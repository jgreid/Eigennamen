services:
  # Main API server
  api:
    build:
      context: .
      dockerfile: server/Dockerfile
      args:
        # Optional smart-bot embeddings. Default empty = unchanged build. To enable:
        #   BOT_EMBEDDINGS_MODEL=numberbatch docker compose up -d --build
        # (the baked file is auto-detected at runtime). BOT_EMBEDDINGS_WIDE adds the
        # wide comprehension tier — pair it with a BOT_EMBEDDINGS_MAX_WORDS raise and
        # enough container memory (see fly.toml's notes; ~550 MB RSS at load).
        BOT_EMBEDDINGS_MODEL: ${BOT_EMBEDDINGS_MODEL:-}
        BOT_EMBEDDINGS_WIDE: ${BOT_EMBEDDINGS_WIDE:-0}
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    environment:
      # Use development for local Docker environment
      # Production settings are configured in fly.toml for Fly.io deployment
      - NODE_ENV=development
      - PORT=3000
      # Secrets are read from .env file (see .env.example for template)
      # Run: cp .env.example .env  to get started
      - REDIS_URL=redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}@redis:6379
      - JWT_SECRET=${JWT_SECRET:?Set JWT_SECRET in .env}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - LOG_LEVEL=debug
      # Set to /app/embeddings/vectors.vec (and build with BOT_EMBEDDINGS_MODEL) for smart bots.
      - BOT_EMBEDDINGS_PATH=${BOT_EMBEDDINGS_PATH:-}
    depends_on:
      redis:
        condition: service_healthy
    command: node dist/index.js
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
      nproc:
        soft: 4096
        hard: 4096
    networks:
      - eigennamen-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis Cache
  redis:
    image: redis:7-alpine
    # Run as the non-root redis user directly. The image normally starts as root
    # and drops to this user via gosu, but cap_drop: ALL below removes the
    # SETUID/SETGID capabilities gosu needs — which fails with
    # "failed switching to redis: operation not permitted". Starting as the
    # redis user skips that switch entirely (same approach as the API container,
    # which sets USER in its Dockerfile), so the hardening below stays intact.
    user: redis
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "REDISCLI_AUTH=$REDIS_PASSWORD redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - eigennamen-network

volumes:
  redis_data:

networks:
  eigennamen-network:
    driver: bridge
